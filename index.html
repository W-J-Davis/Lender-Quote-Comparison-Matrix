<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Workspace — Deals</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <h1>Deal Workspace</h1>
    <span class="tag">Debt &amp; Structured Finance</span>
  </div>
  <nav class="site-nav">
    <a href="index.html" class="active">Deals</a>
    <a href="#" onclick="logout();return false;">Log out</a>
  </nav>
</header>

<main class="page">
  <div class="page-head">
    <div>
      <h2>All Deals</h2>
      <p class="sub">Every deal you're tracking, and which tools have data on it.</p>
    </div>
    <button class="btn-primary" onclick="openNewDealModal()">+ New Deal</button>
  </div>

  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search by deal name or property type…" oninput="renderDeals()" />
    <select id="status-filter" onchange="renderDeals()">
      <option value="">All statuses</option>
      <option value="active">Active</option>
      <option value="closed">Closed</option>
      <option value="dead">Dead</option>
    </select>
    <select id="tool-filter" onchange="renderDeals()">
      <option value="">Any tool</option>
      <!-- populated from TOOLS registry -->
    </select>
  </div>

  <div class="deal-grid" id="deal-grid">
    <div class="empty-state" style="grid-column:1/-1"><div class="big">⏳</div><p>Loading deals…</p></div>
  </div>

  <p class="footnote">Live data — saved to your team's shared database. Visible to anyone signed in with the team password.</p>
</main>

<!-- NEW DEAL MODAL -->
<div class="modal-overlay" id="new-deal-modal">
  <div class="modal-box">
    <h3>New Deal</h3>
    <div class="form-row">
      <label>Deal / Property Name *</label>
      <input type="text" id="nd-name" placeholder="e.g. 123 Main St, Dallas TX" />
    </div>
    <div class="form-row">
      <label>Property Type</label>
      <input type="text" id="nd-type" placeholder="e.g. Multifamily" />
    </div>
    <div class="form-row">
      <label>Loan Request ($)</label>
      <input type="text" id="nd-amount" placeholder="e.g. 12,500,000" />
    </div>
    <div class="form-row">
      <label>Status</label>
      <select id="nd-status">
        <option value="active">Active</option>
        <option value="closed">Closed</option>
        <option value="dead">Dead</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeNewDealModal()">Cancel</button>
      <button class="btn-primary" onclick="submitNewDeal()">Create Deal</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="mock-data.js"></script>
<script>
function populateToolFilter() {
  const sel = document.getElementById('tool-filter');
  TOOLS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.key;
    opt.textContent = t.label;
    sel.appendChild(opt);
  });
}

function statusPillClass(status) {
  return { active: 'status-active', closed: 'status-closed', dead: 'status-dead' }[status] || 'status-active';
}

function toolBadgeHtml(deal) {
  return TOOLS.map(t => {
    const data = deal.tools ? deal.tools[t.key] : null;
    const on = !!data;
    return `<span class="tool-badge ${on ? 'on' : ''}">${t.icon} ${t.label}${on && data.count ? ' · ' + data.count : ''}</span>`;
  }).join('');
}

async function renderDeals() {
  const grid = document.getElementById('deal-grid');
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;
  const toolFilter = document.getElementById('tool-filter').value;

  let deals = await loadDeals();
  if (q) deals = deals.filter(d => d.name.toLowerCase().includes(q) || (d.propertyType || '').toLowerCase().includes(q));
  if (statusFilter) deals = deals.filter(d => d.status === statusFilter);
  if (toolFilter) deals = deals.filter(d => d.tools && d.tools[toolFilter]);

  if (deals.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">🗂️</div><p>No deals match. Try adjusting filters, or create a new deal.</p></div>`;
    return;
  }

  grid.innerHTML = deals.map(d => `
    <div class="deal-card" onclick="location.href='deal.html?id=${encodeURIComponent(d.id)}'">
      <div class="dc-top">
        <div class="dc-name">${d.name}</div>
        <span class="status-pill ${statusPillClass(d.status)}">${d.status}</span>
      </div>
      <div class="dc-meta">${d.propertyType || 'Property type not set'} · ${fmtMoney(d.loanAmount)} · ${fmtDate(d.date)}</div>
      <div class="dc-tools">${toolBadgeHtml(d)}</div>
    </div>
  `).join('');
}

function openNewDealModal() { document.getElementById('new-deal-modal').classList.add('open'); }
function closeNewDealModal() {
  document.getElementById('new-deal-modal').classList.remove('open');
  ['nd-name','nd-type','nd-amount'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nd-status').selectedIndex = 0;
}

async function submitNewDeal() {
  const name = document.getElementById('nd-name').value.trim();
  if (!name) { alert('Deal name is required.'); return; }
  const propertyType = document.getElementById('nd-type').value.trim();
  const loanAmount = parseFloat(document.getElementById('nd-amount').value.replace(/[^0-9.]/g, '')) || null;
  const status = document.getElementById('nd-status').value;
  const btn = document.querySelector('#new-deal-modal .btn-primary');
  btn.textContent = 'Creating…'; btn.disabled = true;
  try {
    const deal = await createDeal({ name, propertyType, loanAmount, status });
    location.href = 'deal.html?id=' + encodeURIComponent(deal.id);
  } finally {
    btn.textContent = 'Create Deal'; btn.disabled = false;
  }
}

(async () => {
  await requireAuth();
  populateToolFilter();
  await renderDeals();

  // Live sync: refresh the list if anyone (including you, in another
  // tab) adds/edits a deal or logs a lender quote against one.
  sb.channel('deals-dashboard')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'deals' }, renderDeals)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'lender_quotes' }, renderDeals)
    .subscribe();
})();
</script>
</body>
</html>
