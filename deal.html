<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Workspace</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="brand">
    <h1>Deal Workspace</h1>
    <span class="tag">Debt &amp; Structured Finance</span>
  </div>
  <nav class="site-nav">
    <a href="index.html">Deals</a>
    <a href="#" onclick="logout();return false;">Log out</a>
  </nav>
</header>

<main class="page" id="page-content">
  <!-- filled by JS -->
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="mock-data.js"></script>
<script>
function statusPillClass(status) {
  return { active: 'status-active', closed: 'status-closed', dead: 'status-dead' }[status] || 'status-active';
}

function toolCardHtml(deal, tool) {
  const data = deal.tools ? deal.tools[tool.key] : null;
  const hasData = !!data;
  return `
    <div class="tool-card ${hasData ? 'active-tool' : ''}">
      <div class="tc-icon">${tool.icon}</div>
      <div class="tc-label">${tool.label}</div>
      <div class="tc-desc">${tool.description}</div>
      <div class="tc-status ${hasData ? 'has-data' : 'empty'}">${hasData ? `✓ ${data.count} record${data.count === 1 ? '' : 's'}` : 'Not started'}</div>
      <button class="btn-ghost" onclick="openTool('${tool.key}')">${hasData ? 'Open →' : 'Start →'}</button>
    </div>
  `;
}

function openTool(key) {
  const tool = TOOLS.find(t => t.key === key);
  if (tool && tool.href) { location.href = tool.href + '?deal=' + encodeURIComponent(currentDealId); return; }
  alert(`"${tool ? tool.label : key}" isn't built yet — this button will open that tool, scoped to this deal, once it's built.`);
}

let currentDealId = null;

async function render() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  currentDealId = id;
  const content = document.getElementById('page-content');
  content.innerHTML = `<div class="empty-state"><div class="big">⏳</div><p>Loading deal…</p></div>`;
  const deal = id ? await getDeal(id) : null;

  if (!deal) {
    content.innerHTML = `
      <a class="back-link" href="index.html">← Back to all deals</a>
      <div class="empty-state">
        <div class="big">🔍</div>
        <p>Deal not found — it may have been deleted, or the link is wrong. Head back to the deals list.</p>
      </div>`;
    return;
  }

  content.innerHTML = `
    <a class="back-link" href="index.html">← Back to all deals</a>

    <div class="deal-header-card">
      <div>
        <div class="dh-name">${deal.name}</div>
        <span class="status-pill ${statusPillClass(deal.status)}">${deal.status}</span>
        <div class="dh-fields">
          <div class="dh-field"><label>Property Type</label><span>${deal.propertyType || '—'}</span></div>
          <div class="dh-field"><label>Loan Request</label><span>${fmtMoney(deal.loanAmount)}</span></div>
          <div class="dh-field"><label>Date Added</label><span>${fmtDate(deal.date)}</span></div>
        </div>
      </div>
    </div>

    <div class="page-head">
      <div>
        <h2>Tools on this Deal</h2>
        <p class="sub">Open an existing tool, or start one that hasn't been used on this deal yet.</p>
      </div>
    </div>

    <div class="tool-grid">
      ${TOOLS.map(t => toolCardHtml(deal, t)).join('')}
      <div class="tool-card placeholder">+ New tools you build will appear here automatically</div>
    </div>
  `;
}

(async () => {
  await requireAuth();
  await render();

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (id) {
    sb.channel('deal-' + id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'deals', filter: 'id=eq.' + id }, render)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'lender_quotes', filter: 'deal_id=eq.' + id }, render)
      .subscribe();
  }
})();
</script>
</body>
</html>
